parameters:
  - name: Sign
    type: boolean
    default: false
  - name: Integration
    type: boolean
    default: false
  # Name of the PowerShell repository build/test dependencies are installed from.
  # Defaults to the public PowerShell Gallery; pipelines pass a CFS-backed feed
  # to satisfy network-isolation (CFSClean) policies.
  - name: DependencyRepository
    type: string
    default: 'PSGallery'
  # v2 index URL of the CFS feed backing DependencyRepository.
  - name: CfsFeedUrl
    type: string
    default: ''

steps:
# Sets up the Azure Artifacts credential provider. Required so that transitive
# dependency installs (e.g. Microsoft.Graph.Authentication) authenticate to the
# private CFS feed: PowerShellGet does not propagate -Credential to transitive
# dependencies, so those requests rely on the credential provider instead.
- ${{ if ne(parameters.CfsFeedUrl, '') }}:
  - task: NuGetAuthenticate@1
    displayName: 'Authenticate to CFS feed'
- task: powershell@2
  displayName: 'Show current PowerShell version information'
  inputs:
    targetType: inline
    script: 'echo $PSVersionTable'
    pwsh: true
- task: powershell@2
  displayName: 'Set maximum function count'
  inputs:
    targetType: inline
    script: '$MaximumFunctionCount=32768'
    pwsh: true
- task: powershell@2
  displayName: 'Install Dependencies Entra'
  inputs:
    targetType: inline
    script: |
      ./build/Install-Dependencies.ps1 -ModuleName Entra -Verbose      
    pwsh: true
  env:
    DEPENDENCY_PS_REPO: ${{ parameters.DependencyRepository }}
    DEPENDENCY_PS_FEED_URL: ${{ parameters.CfsFeedUrl }}
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
- task: powershell@2
  displayName: 'Install PlatyPS'
  inputs:
    targetType: inline
    script: ./build/Install-GalleryModule.ps1 -Name PlatyPS
    pwsh: true
  env:
    DEPENDENCY_PS_REPO: ${{ parameters.DependencyRepository }}
    DEPENDENCY_PS_FEED_URL: ${{ parameters.CfsFeedUrl }}
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
- task: powershell@2
  displayName: 'Build Entra'
  inputs:
    targetType: inline
    script: |
      ./build/Create-EntraModule.ps1 -Module Entra -Verbose
      ./build/Create-EntraModule.ps1 -Module Entra -Root -Verbose
    pwsh: true
- ${{ if eq(parameters.Sign, true) }}:
  - template: ../common-templates/esrp/codesign.yml
    parameters:
      FolderPath: "bin"
      Pattern: "*.psm1, *.psd1, *.format.ps1xml, *.ps1"
  - task: PowerShell@2
    displayName: "Validate Authenticode Signature"
    inputs:
      targetType: "inline"
      pwsh: true
      script: |
        $ModulePsd1 = "bin/Microsoft.Entra.psd1"
        $ModulePsm1 = "bin/Microsoft.Entra.psm1"
        ($ModulePsd1 | Get-AuthenticodeSignature).Status | Should -Be "Valid"
        ($ModulePsm1 | Get-AuthenticodeSignature).Status | Should -Be "Valid"
- task: powershell@2
  displayName: 'Create Module Files Entra'
  inputs:
    targetType: inline
    script: |
      . ./build/common-functions.ps1
      Create-ModuleFolder
    pwsh: true
- task: PublishBuildArtifacts@1
  displayName: 'Publish Module Files Entra'
  inputs:
    ArtifactName: 'Module Files'
    PathtoPublish: 'bin'
- task: powershell@2
  displayName: 'Register Local Gallery'
  inputs:
    targetType: inline
    script: |
      . ./build/common-functions.ps1
      Register-LocalGallery -Path $(Build.ArtifactStagingDirectory)
    pwsh: true    
- task: powershell@2
  displayName: 'Publish to Local Gallery Entra'
  inputs:
    targetType: inline
    script: ./build/Publish-LocalCompatModule.ps1 -Install
    pwsh: true
- task: PublishBuildArtifacts@1
  displayName: 'Publish Module Nuget File Entra'
  inputs:
    ArtifactName: 'Module Nuget'
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
- task: powershell@2
  displayName: 'Remove Build Folders'
  inputs:
    targetType: inline
    script: |
      . ./build/common-functions.ps1
      Remove-BuildDirectories
    pwsh: true
- task: powershell@2
  displayName: 'Install Dependencies EntraBeta'
  inputs:
    targetType: inline
    script: |      
      ./build/Install-Dependencies.ps1 -ModuleName EntraBeta -Verbose
    pwsh: true
  env:
    DEPENDENCY_PS_REPO: ${{ parameters.DependencyRepository }}
    DEPENDENCY_PS_FEED_URL: ${{ parameters.CfsFeedUrl }}
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
- task: powershell@2
  displayName: 'Build EntraBeta'
  inputs:
    targetType: inline
    script: |
      ./build/Create-EntraModule.ps1 -Module EntraBeta -Verbose
      ./build/Create-EntraModule.ps1 -Module EntraBeta -Root -Verbose
    pwsh: true
- ${{ if eq(parameters.Sign, true) }}:
  - template: ../common-templates/esrp/codesign.yml
    parameters:
      FolderPath: "bin"
      Pattern: "*.psm1, *.psd1, *.format.ps1xml, *.ps1"
  - task: PowerShell@2
    displayName: "Validate Authenticode Signature"
    inputs:
      targetType: "inline"
      pwsh: true
      script: |
        $ModulePsd1 = "bin/Microsoft.Entra.Beta.psd1"
        $ModulePsm1 = "bin/Microsoft.Entra.Beta.psm1"
        ($ModulePsd1 | Get-AuthenticodeSignature).Status | Should -Be "Valid"
        ($ModulePsm1 | Get-AuthenticodeSignature).Status | Should -Be "Valid"
- task: powershell@2
  displayName: 'Create Module Files EntraBeta'
  inputs:
    targetType: inline
    script: |
      . ./build/common-functions.ps1
      Create-ModuleFolder
    pwsh: true
- task: PublishBuildArtifacts@1
  displayName: 'Publish Module Files EntraBeta'
  inputs:
    ArtifactName: 'Module Files'
    PathtoPublish: 'bin'    
- task: powershell@2
  displayName: 'Publish to Local Gallery EntraBeta'
  inputs:
    targetType: inline
    script: ./build/Publish-LocalCompatModule.ps1 -Install
    pwsh: true
- task: PublishBuildArtifacts@1
  displayName: 'Publish Module Nuget File EntraBeta'
  inputs:
    ArtifactName: 'Module Nuget'
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
- task: powershell@2
  displayName: 'Remove Build Folders'
  inputs:
    targetType: inline
    script: |
      . ./build/common-functions.ps1
      Remove-BuildDirectories
    pwsh: true
- task: powershell@2
  displayName: 'Install Pester'
  inputs:
    targetType: inline
    script: ./build/Install-GalleryModule.ps1 -Name Pester -SkipPublisherCheck
    pwsh: true
  env:
    DEPENDENCY_PS_REPO: ${{ parameters.DependencyRepository }}
    DEPENDENCY_PS_FEED_URL: ${{ parameters.CfsFeedUrl }}
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
- task: powershell@2
  displayName: 'Run tests Entra'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      cd test/Entra
      Invoke-Pester -OutputFile "./test/results/pester-test-results-ad.xml" -OutputFormat NUnitXml
- task: PublishTestResults@2
  inputs:
    testResultsFormat: NUnit
    testResultsFiles: "./test/results/pester-test-results-ad.xml"
    failTaskOnFailedTests: true
- task: powershell@2
  displayName: 'Run tests Entra Beta'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      cd test/EntraBeta
      Invoke-Pester -OutputFile "./test/results/pester-test-results-ad.xml" -OutputFormat NUnitXml
- task: PublishTestResults@2
  inputs:
    testResultsFormat: NUnit
    testResultsFiles: "./test/results/pester-test-results-ad.xml"
    failTaskOnFailedTests: true
- ${{ if eq(parameters.Integration, true) }}:
  - task: powershell@2
    displayName: 'Run Entra integration tests'
    inputs:
      targetType: inline
      pwsh: true
      script: |
        cd test/module/Integration/Entra
        Invoke-Pester -OutputFile "./test/results/pester-test-results-preview.xml" -OutputFormat NUnitXml
  - task: PublishTestResults@2
    inputs:
      testResultsFormat: NUnit
      testResultsFiles: "./test/results/pester-test-results-preview.xml"
      failTaskOnFailedTests: true
  - task: powershell@2
    displayName: 'Run EntraBeta integration tests'
    inputs:
      targetType: inline
      pwsh: true
      script: |
        cd test/module/Integration/EntraBeta
        Invoke-Pester -OutputFile "./test/results/pester-test-results-preview.xml" -OutputFormat NUnitXml
  - task: PublishTestResults@2
    inputs:
      testResultsFormat: NUnit
      testResultsFiles: "./test/results/pester-test-results-preview.xml"
      failTaskOnFailedTests: true
- task: powershell@2
  displayName: 'Remove Local Gallery'
  inputs:
    targetType: inline
    script: |
      . ./build/common-functions.ps1
      Unregister-LocalGallery
    pwsh: true
- task: PSScriptAnalyzer@1
  displayName: 'Run PSScriptAnalyzer'
  inputs:
    Path: '$(Build.SourcesDirectory)'
    Settings: required
    IgnorePattern: .gdn
    Recurse: true
